---
name: Release

"on":
  release:
    types: [released]

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install Flox
        uses: flox/install-flox-action@9428713e8d3883274c334b4b95b8830beebd24d2 # v2
      - name: Remove Flox installer (if it exists)
        run: rm -f flox.x86_64-linux.deb
      - name: Publish crate
        uses: flox/activate-action@410568008895a0f2e09a34bbd9523f8ef1f2d292 # v1
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
        with:
          command: just publish
