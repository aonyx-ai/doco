---
name: Continuous Integration

"on":
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  targets:
    name: Enumerate Just recipes
    runs-on: warp-ubuntu-latest-x64-2x
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.export-targets.outputs.targets }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install Just
        uses: taiki-e/install-action@56545b37b57562edd73171cb6c62cc509db4c34e # v2
        with:
          tool: just
      - name: Export targets
        id: export-targets
        run: echo "targets=$(just --list | awk '/check-|format-|lint-|test-/{print $1}' | jq -cnR '[inputs]')" >> "$GITHUB_OUTPUT"

  checks:
    name: ${{ matrix.target }}
    runs-on: warp-ubuntu-latest-x64-2x
    permissions:
      contents: read
    needs: targets
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.targets.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install Flox
        uses: flox/install-flox-action@f6002ed63e483f134001de7b4b45be891e00b09f # v2
      - name: Remove Flox installer (if it exists)
        run: rm -f flox.x86_64-linux.deb
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "v0-${{ matrix.target }}"
          cache-on-failure: true
          cache-provider: "warpbuild"
      - name: Run check with Just
        uses: flox/activate-action@7065dcbe5583b7b015f07a8ebd49d7266e3053e8 # v1
        with:
          command: just ${{ matrix.target }}
      - name: Upload coverage report
        if: matrix.target == 'test-coverage'
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: cobertura.xml

  success:
    name: All checks succeeded
    runs-on: warp-ubuntu-latest-x64-2x
    permissions: {}
    needs: checks
    if: always()
    steps:
      - name: Check if all checks succeeded
        # zizmor: ignore[template-injection]
        run: jq --exit-status 'all(.result == "success")' <<< '${{ toJson(needs) }}'
