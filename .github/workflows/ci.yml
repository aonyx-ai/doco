---
name: Continuous Integration

"on":
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  targets:
    name: Enumerate Just recipes
    runs-on: warp-ubuntu-latest-x64-2x
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.export-targets.outputs.targets }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install Just
        uses: taiki-e/install-action@80779d0b81222e7a5d0c5751d3c2537d4a36f556 # v2
        with:
          tool: just
      - name: Export targets
        id: export-targets
        run: echo "targets=$(just --list | awk '/check-|format-|lint-|test-/{print $1}' | jq -cnR '[inputs]')" >> "$GITHUB_OUTPUT"

  checks:
    name: ${{ matrix.target }}
    runs-on: warp-ubuntu-latest-x64-2x
    permissions:
      contents: read
    needs: targets
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.targets.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install Flox
        uses: flox/install-flox-action@c94e7e1ab56ae14fe98bae4fd84384fd135f0c2a # v2
      - name: Remove Flox installer (if it exists)
        run: rm -f flox.x86_64-linux.deb
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "v0-${{ matrix.target }}"
          cache-on-failure: true
          cache-provider: "warpbuild"
      - name: Run check with Just
        uses: flox/activate-action@410568008895a0f2e09a34bbd9523f8ef1f2d292 # v1
        with:
          command: just ${{ matrix.target }}
      - name: Upload coverage report
        if: matrix.target == 'test-coverage'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: cobertura.xml

  success:
    name: All checks succeeded
    runs-on: warp-ubuntu-latest-x64-2x
    permissions: {}
    needs: checks
    if: always()
    steps:
      - name: Check if all checks succeeded
        # zizmor: ignore[template-injection]
        run: jq --exit-status 'all(.result == "success")' <<< '${{ toJson(needs) }}'
